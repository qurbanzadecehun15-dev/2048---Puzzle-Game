name: Build APK with Custom Icon
on: [push, workflow_dispatch]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      
      - name: set up JDK 17
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'zulu'
          
      - name: Install Cordova & Unzip
        run: |
          sudo apt-get install unzip
          npm install -g cordova
          
      - name: Create Project and Extract ZIP
        run: |
          cordova create myApp com.muhtar.app "2048 Oyunum"
          rm -rf myApp/www/*
          unzip index.icon.zip -d myApp/www/
          
      - name: Set Custom Icon
        run: |
          mkdir -p myApp/res/icon/android
          cp icon.png myApp/res/icon/android/icon.png
          sed -i '/<\/platform>/i \    <icon src="res/icon/android/icon.png" platform="android" width="512" height="512" \/>' myApp/config.xml
          
      - name: Build Android
        run: |
          cd myApp
          cordova platform add android
          cordova build android --device
          
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: oyun-iconlu-apk
          path: myApp/platforms/android/app/build/outputs/apk/debug/app-debug.apk


